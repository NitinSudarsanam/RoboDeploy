# Example RoboDeploy presets (not part of the installed robodeploy package).
# Requires repo root on PYTHONPATH (pip install -e . from the repo).

kuka_pick_mujoco:
  robot: kuka
  backend: mujoco
  task: pick_place
  policy: example_reach_pick
  backend_kwargs:
    config:
      allow_actuator_name_fallback: true
  custom_modules:
    - examples.tasks
    - examples.policies

franka_pick_mujoco:
  robot: example_franka_mujoco
  backend: mujoco
  task: pick_place
  policy: example_reach_pick
  backend_kwargs:
    config:
      allow_actuator_name_fallback: true
  custom_modules:
    - examples.tasks
    - examples.policies
    - examples.franka_pick_place_mujoco.components

kuka_sinusoid_mujoco:
  robot: user_kuka
  backend: mujoco
  task: user_kuka_sinusoid
  policy: user_sinusoid
  backend_kwargs:
    config:
      allow_actuator_name_fallback: true
  custom_modules:
    - examples.user_kuka_sinusoid.components

kuka_sensor_pick_mujoco:
  robot: kuka
  backend: mujoco
  task: pick_place
  policy: example_sensor_reach_pick
  backend_kwargs:
    config:
      allow_actuator_name_fallback: true
      enable_viewer: false
  sensor_rigs:
    - rig_id: arm_sensors
      ee_link: robot0/ee_link
      prop_pose:
        prop_names: [source, target]
  custom_modules:
    - examples.tasks
    - examples.sensors
    - examples.policies

# Sim/real preset pairs for transfer evaluation and deployment.
# Requires repo root on PYTHONPATH (pip install -e . from the repo).

kuka_pick:
  sim_preset: kuka_pick_mujoco
  real_preset: kuka_sensor_pick_mujoco
  shared:
    obs_spec_policy: raise
    custom_modules:
      - examples.tasks
      - examples.sensors
      - examples.policies
  domain_randomization:
    level: FULL
    sensor_noise:
      joint_pos_std: 0.001
      ee_pos_std: 0.001
  transfer_notes: >
    Use kuka_sensor_pick_mujoco as a ROS2/real proxy until hardware preset exists.
    Tune sensor_noise_scale in DR sweep before deploy.

franka_pick:
  sim_preset: franka_pick_mujoco
  real_preset: franka_pick_mujoco
  shared:
    obs_spec_policy: raise
  domain_randomization:
    level: LIGHT
  transfer_notes: Sim-only pair for CI transfer-eval proxy tests.

# --- sim2real benchmark suite (benchmarks/sim2real/* preset metadata) ---


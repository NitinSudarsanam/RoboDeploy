name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,training,rl]"
      # Proves: registry, benchmarks YAML, eval harness (incl. test_benchmarks.py, test_backend_registry.py).
      - name: Run unit tests
        run: python -m pytest tests/ -q -m "not hardware and not slow" --ignore=tests/test_sensors_and_scenes_e2e.py --ignore=tests/test_live_ros2_sensors.py --ignore=tests/test_live_gazebo_sensors.py --ignore=tests/test_live_gazebo_pick_e2e.py

  sensor-e2e-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with sim extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim]"
      # Proves: non-dummy examples.cli preset smoke, MuJoCo sensor/scene e2e, benchmark preset env build (mujoco).
      - name: MuJoCo sensor e2e (Linux)
        env:
          MUJOCO_GL: egl
        run: python -m pytest tests/test_sensors_and_scenes_e2e.py tests/test_sensor_mujoco_integration.py tests/test_sensor_rig.py tests/test_gazebo_urdf_sensors.py tests/test_gazebo_urdf_mount.py tests/test_gazebo_sensor_rig_smoke.py tests/test_mujoco_grasp.py tests/test_mujoco_grasp_welds.py tests/test_example_envs.py tests/test_from_config_simulator.py tests/test_pick_parity.py tests/test_benchmarks.py::BenchmarkPresetBuildTests tests/training/test_gym_register.py::GymRegisterTests::test_kuka_pick_mujoco_env_registered -q
      - name: Examples CLI non-dummy smoke (kuka_pick_mujoco)
        env:
          MUJOCO_GL: egl
        run: python -m examples.cli run-episode --preset kuka_pick_mujoco --steps 50 --json

  training-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with training + sim extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,training,rl,sim]"
      # Proves: SB3 100k, PPO reach_target ≥80%, SubprocVecEnv ≥3× throughput (fork),
      # BC checkpoint eval on MuJoCo reach_target (non-dummy backend).
      - name: Training integration tests (incl. slow)
        env:
          MUJOCO_GL: egl
        run: python -m pytest tests/training/ -q -m "not hardware"

  eval-mujoco-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with sim + eval extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim,eval]"
      # Proves: manipulation_v1 reach_target builds and runs on MuJoCo (not dummy-only fiction).
      - name: MuJoCo benchmark eval smoke (3 episodes)
        env:
          MUJOCO_GL: egl
        run: |
          python -m robodeploy.cli eval \
            --benchmark manipulation_v1/reach_target \
            --policy scripted \
            --backend mujoco \
            --episodes 3 \
            --benchmarks-root benchmarks

  sensor-live-ros2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ROS 2 Jazzy
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y ros-jazzy-ros-base ros-jazzy-sensor-msgs ros-jazzy-geometry-msgs ros-jazzy-tf2-ros python3-rosdep
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim]"
      - name: Live ROS2 sensor tests
        env:
          ROBODEPLOY_LIVE_ROS2: "1"
        run: |
          source /opt/ros/jazzy/setup.bash
          python -m pytest tests/test_live_ros2_sensors.py -q

  sensor-live-gazebo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ROS 2 Jazzy + Gazebo
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y ros-jazzy-ros-base ros-jazzy-ros-gz ros-jazzy-sensor-msgs ros-jazzy-geometry-msgs ros-jazzy-tf2-ros gz-harmonic
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim]"
      - name: Live Gazebo sensor + pick-place tests
        env:
          ROBODEPLOY_LIVE_GAZEBO: "1"
        run: |
          source /opt/ros/jazzy/setup.bash
          pip install -e ".[kinematics]" || true
          python -m pytest tests/test_live_gazebo_sensors.py tests/test_live_gazebo_pick_e2e.py -m live_gazebo -q

  isaacsim-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: IsaacSim smoke tests (mocked import path)
        run: python -m pytest tests/test_isaacsim_smoke.py tests/test_isaacsim_obs.py tests/test_multirobot_isaacsim.py tests/test_backend_parity.py tests/test_gazebo_scene_builder.py tests/test_gazebo_contact_live.py tests/test_ros2_controllers_parity.py -q

  # Blocker: GitHub-hosted ubuntu-latest has no NVIDIA GPU. Isaac Sim Kit requires
  # GPU + proprietary runtime; pulling nvcr.io/nvidia/isaac-sim:4.1.0 alone is
  # insufficient without nvidia-container-toolkit on a self-hosted runner.
  isaacsim-gpu-live:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Document Isaac Sim GPU CI blocker
        run: |
          echo "Isaac Sim live GPU CI requires a self-hosted runner with:"
          echo "  - NVIDIA GPU + driver"
          echo "  - nvidia-container-toolkit (for Docker) OR native Isaac Sim 4.1+ install"
          echo "  - Kit python runtime (isaacsim.simulation_app)"
          echo "Mocked parity tests run in isaacsim-smoke; enable this job on GPU runners."
      - name: Attempt Isaac Sim container smoke (expected to skip/fail without GPU)
        continue-on-error: true
        run: |
          docker pull nvcr.io/nvidia/isaac-sim:4.1.0 || true
          echo "Container pull attempted; live headless smoke deferred to self-hosted GPU runner."

  multirobot-mujoco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with sim extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim]"
      - name: Multi-robot MuJoCo + registry tests
        env:
          MUJOCO_GL: egl
        run: python -m pytest tests/test_multirobot_mujoco.py tests/test_registry_duplicate.py -q

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build CPU Docker image
        run: docker build -f docker/Dockerfile.cpu -t robodeploy-cpu:ci .
      # Proves: installed package + examples presets discoverable in container (not just --help).
      - name: Smoke test container entrypoint and example presets
        run: |
          docker run --rm robodeploy-cpu:ci robodeploy --help
          docker run --rm robodeploy-cpu:ci python -m examples.cli list-presets --json

  conda-recipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate conda recipe (pip fallback)
        run: |
          python -m pip install --upgrade pip
          python -m pytest tests/test_conda_recipe.py::CondaRecipeTests::test_meta_yaml_exists_and_lists_robodeploy tests/test_conda_recipe.py::CondaRecipeTests::test_recipe_source_install_imports -q

  package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Proves: sdist/wheel build, twine metadata check, wheel install + CLI entrypoint (no PyPI upload).
      - name: Sdist and wheel build smoke
        run: |
          python -m pip install --upgrade pip
          python -m pytest tests/test_package_build.py -q

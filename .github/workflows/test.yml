name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m unittest discover -s tests -q

  mujoco-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with sim extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim]"
      - name: Import MuJoCo backend
        run: python -c "from robodeploy.backends.sim.mujoco.backend import MuJoCoBackend; print(MuJoCoBackend)"

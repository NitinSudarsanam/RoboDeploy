name: ppo-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"

permissions:
  contents: read

concurrency:
  group: ppo-nightly
  cancel-in-progress: false

jobs:
  ppo-reach-stub:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,sim,training]"
      - name: PPO reach 50k proxy (nightly gate)
        run: |
          python examples/train_ppo_reach.py \
            --backend dummy \
            --total-steps 50000 \
            --n-envs 4 \
            --eval-every 10000 \
            --log-dir /tmp/robodeploy_ppo_nightly
      - name: Upload training summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppo-reach-stub-summary
          path: /tmp/robodeploy_ppo_nightly/training_summary.json
          retention-days: 7
          if-no-files-found: ignore

robot: kuka
backend: isaacsim
task: peg_insertion
policy: example_sensor_reach_pick
task_kwargs:
  require_objects: true
  success_threshold: 0.04
obs_spec_policy: raise
backend_kwargs:
  config:
    headless: true
sensor_rigs:
  - rig_id: arm_sensors
    ee_link: robot0/ee_link
    prop_pose:
      prop_names: [peg, hole]
max_episode_steps: 600
custom_modules:
  - robodeploy.demos.tasks
  - robodeploy.demos.sensors
  - robodeploy.demos.policies

robot: kuka
backend: isaacsim
task: pour
policy: example_sensor_reach_pick
task_kwargs:
  require_objects: true
obs_spec_policy: raise
backend_kwargs:
  config:
    headless: true
sensor_rigs:
  - rig_id: arm_sensors
    ee_link: robot0/ee_link
    prop_pose:
      prop_names: [cup_source, cup_target]
max_episode_steps: 800
custom_modules:
  - robodeploy.demos.tasks
  - robodeploy.demos.sensors
  - robodeploy.demos.policies

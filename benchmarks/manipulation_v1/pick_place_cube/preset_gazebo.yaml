robot: kuka
backend: gazebo
task: pick_place
policy: example_sensor_reach_pick
task_kwargs:
  require_objects: true
obs_spec_policy: raise
backend_kwargs:
  config:
    sim:
      kind: gazebo
      headless: true
      readiness_timeout_s: 60.0
sensor_rigs:
  - rig_id: arm_sensors
    ee_link: robot0/ee_link
    prop_pose:
      prop_names: [source, target]
max_episode_steps: 500
custom_modules:
  - examples.tasks
  - examples.sensors
  - examples.policies

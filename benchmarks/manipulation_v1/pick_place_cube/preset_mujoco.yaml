robot: kuka
backend: mujoco
task: pick_place
policy: example_sensor_reach_pick
task_kwargs:
  require_objects: true
obs_spec_policy: raise
backend_kwargs:
  config:
    allow_actuator_name_fallback: true
    enable_viewer: false
sensor_rigs:
  - rig_id: arm_sensors
    ee_link: robot0/ee_link
    prop_pose:
      prop_names: [source, target]
max_episode_steps: 500
custom_modules:
  - robodeploy.demos.tasks
  - robodeploy.demos.sensors
  - robodeploy.demos.policies

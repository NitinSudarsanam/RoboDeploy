robot: kuka
backend: mujoco
task: showcase_scene
policy: example_joint_track
task_kwargs:
  require_objects: true
obs_spec_policy: raise
backend_kwargs:
  config:
    allow_actuator_name_fallback: true
    enable_viewer: false
sensor_rigs:
  - rig_id: arm_sensors
    ee_link: robot0/ee_link
    prop_pose:
      prop_names: [showcase_box, showcase_cylinder, showcase_sphere, showcase_capsule]
max_episode_steps: 1500
custom_modules:
  - robodeploy.demos.tasks
  - robodeploy.demos.sensors
  - robodeploy.demos.policies

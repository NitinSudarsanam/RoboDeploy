robot: kuka
backend: mujoco
task: showcase_scene
policy: example_joint_track
task_kwargs:
  require_objects: true
  require_rgb: false
obs_spec_policy: raise
backend_kwargs:
  config:
    allow_actuator_name_fallback: true
    enable_viewer: false
sensor_rigs:
  - rig_id: arm_sensors
    ee_link: robot0/ee_link
    prop_pose:
      prop_names: [showcase_box, showcase_cylinder, showcase_sphere]
max_episode_steps: 800
custom_modules:
  - examples.tasks
  - examples.sensors
  - examples.policies

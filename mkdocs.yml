site_name: RoboDeploy
site_description: Backend-agnostic robot learning runtime
site_url: https://robodeploy.github.io/RoboDeploy/
repo_url: https://github.com/RahulSajnani/RoboDeploy
repo_name: RahulSajnani/RoboDeploy

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Project Guide: PROJECT_GUIDE.md
  - Platform status: PLATFORM_STATUS.md
  - Repository:
      - README (GitHub): https://github.com/RahulSajnani/RoboDeploy/blob/main/README.md
      - Architecture: https://github.com/RahulSajnani/RoboDeploy/blob/main/ARCHITECTURE.md
      - Contracts: https://github.com/RahulSajnani/RoboDeploy/blob/main/CONTRACTS.md
      - Contributing: https://github.com/RahulSajnani/RoboDeploy/blob/main/CONTRIBUTING.md
      - Examples index: https://github.com/RahulSajnani/RoboDeploy/blob/main/examples/README.md
      - Benchmarks: https://github.com/RahulSajnani/RoboDeploy/blob/main/benchmarks/README.md
      - Integration status: https://github.com/RahulSajnani/RoboDeploy/blob/main/plans/INTEGRATION_STATUS.md
  - Getting started:
      - Tutorial 1 — Hello RoboDeploy: tutorials/01_getting_started.md
      - Tutorial 2 — Teleop: tutorials/02_teleop.md
      - Tutorial 3 — Training: tutorials/03_training.md
      - Tutorial 4 — Sim2Real: tutorials/04_sim2real.md
      - Tutorial 5 — Safety: tutorials/05_safety.md
  - Guides:
      - Task creation: TASK_CREATION.md
      - Policy creation: POLICY_CREATION.md
      - Scene definition: SCENE_DEFINITION.md
      - Sensor integration: SENSOR_INTEGRATION.md
      - Training: TRAINING.md
      - Sim2Real: SIM2REAL.md
      - Safety: SAFETY.md
      - Plugins: PLUGINS.md
  - Reference:
      - CLI reference: CLI_REFERENCE.md
      - API reference: API_REFERENCE.md
      - Demo runbook: DEMO_RUNBOOK.md
      - Backend setup: BACKEND_SETUP.md
      - Release: RELEASE.md
      - SO-101 real robot: SO101_REAL.md
  - Cookbook: COOKBOOK.md
  - Migration 0.2: MIGRATION_0.2.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: ignore
  anchors: warn

docs_dir: docs
site_dir: site
